services:
  - type: web
    name: linguist-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — never commit this
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL after deploying frontend
